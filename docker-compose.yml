services:
  hermes:
    image: nousresearch/hermes-agent:v2026.6.5
    container_name: ${CONTAINER_NAME:-hermes}
    restart: unless-stopped
    stdin_open: true
    tty: true
    env_file:
      - path: .setup-state.env
        required: false
      - path: .env
        required: false
    environment:
      # Values from env_file are passed into the container. Keep only defaults
      # that are safe for first-run/manual compose usage before setup generated files.
      - AGENT_NAME=${AGENT_NAME:-kaguya}
    networks:
      - default
      - mcp-net
    volumes:
      - hermes-data:/opt/data
      - ./custom-init.sh:/etc/cont-init.d/00-custom-init
      - ./templates:/opt/data/templates:ro
      - ./lib:/opt/data/lib:ro
      - ${SOUL_PATH}:/opt/data/custom_SOUL.md:ro
      - ~/.ssh/id_hermes-single:/home/hermes/.ssh/id_hermes-single:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  hermes-data:

networks:
  mcp-net:
    name: mcp-net
    external: true
