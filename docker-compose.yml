services:
  hermes:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-single
    restart: unless-stopped
    entrypoint: ["bash", "-c"]
    command:
      - >
        chown -R 10000:10000 /home/hermes/ /opt/data/ 2>/dev/null || true;
        grep -q "source /opt/hermes/.venv/bin/activate" /root/.bashrc 2>/dev/null ||
        echo "source /opt/hermes/.venv/bin/activate" >> /root/.bashrc;
        exec /usr/bin/tini -g --
        /opt/hermes/docker/entrypoint.sh bash /opt/init.sh
    stdin_open: true
    tty: true
    environment:
      - AGENT_NAME=${AGENT_NAME:-kaguya}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:?error}
      - API_SERVER_KEY=${API_SERVER_KEY:-}
      - API_SERVER_PORT=${PORT:-8642}
      - TERMINAL_ENV=${TERMINAL_ENV:-ssh}
      - SSH_HOST=${SSH_HOST:-}
      - SSH_USER=${SSH_USER:-}
      - DISABLED_TOOLSETS=${DISABLED_TOOLSETS:-[]}
    volumes:
      - hermes-data:/opt/data
      - ./init.sh:/opt/init.sh:ro
      - ./templates:/opt/data/templates:ro
      - ${SOUL_PATH}:/opt/data/custom_SOUL.md:ro
      - ~/.ssh/id_hermes-single:/home/hermes/.ssh/id_hermes-single:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  hermes-data:
