services:
  hermes:
    image: nousresearch/hermes-agent:v2026.6.5
    container_name: hermes-single
    restart: unless-stopped
    stdin_open: true
    tty: true
    environment:
      - AGENT_NAME=${AGENT_NAME:-kaguya}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:?error}
      - API_SERVER_KEY=${API_SERVER_KEY:-}
      - TERMINAL_ENV=${TERMINAL_ENV:-ssh}
      - SSH_HOST=${SSH_HOST:-}
      - SSH_USER=${SSH_USER:-}
      - DISABLED_TOOLSETS=${DISABLED_TOOLSETS:-[]}
      - MEMORY_NUDGE_INTERVAL=${MEMORY_NUDGE_INTERVAL:-10}
      - SKILL_NUDGE_INTERVAL=${SKILL_NUDGE_INTERVAL:-10}
      - TOOL_PROGRESS=${TOOL_PROGRESS:-all}
      - MCP_PLAYWRIGHT_ENABLED=${MCP_PLAYWRIGHT_ENABLED:-false}
    networks:
      - default
      - mcp-net
    volumes:
      - hermes-data:/opt/data
      - ./custom-init.sh:/etc/cont-init.d/00-custom-init
      - ./templates:/opt/data/templates:ro
      - ${SOUL_PATH}:/opt/data/custom_SOUL.md:ro
      - ~/.ssh/id_hermes-single:/home/hermes/.ssh/id_hermes-single:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  hermes-data:

networks:
  mcp-net:
    name: mcp-net
    external: true
